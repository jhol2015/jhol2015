<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #1c2128; stroke-width: 0.5; }
      .accent { fill: #39d353; }
      .name { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 38px; fill: #e6edf3; letter-spacing: -1px; }
      .role { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 13px; fill: #8b949e; }
      .tag { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 11px; }
      .prompt { fill: #39d353; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .cursor { fill: #39d353; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes draw { from{stroke-dashoffset:300} to{stroke-dashoffset:0} }

      .blink { animation: blink 1.1s step-end infinite; }
      .fade1 { animation: fadeIn 0.6s ease 0.2s both; }
      .fade2 { animation: fadeIn 0.6s ease 0.5s both; }
      .fade3 { animation: fadeIn 0.6s ease 0.8s both; }
      .fade4 { animation: fadeIn 0.6s ease 1.1s both; }
      .fade5 { animation: fadeIn 0.6s ease 1.4s both; }
      .slide1 { animation: slideLeft 0.7s ease 0.3s both; }
      .slide2 { animation: slideLeft 0.7s ease 0.55s both; }
      .slide3 { animation: slideLeft 0.7s ease 0.8s both; }
      .dot-pulse { animation: pulse 2s ease-in-out infinite; }
    </style>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1c2128" stroke-width="0.4"/>
    </pattern>

    <linearGradient id="fadeRight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="1" x2="0" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="60%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#26a641"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" class="bg" rx="10"/>
  <rect width="860" height="200" fill="url(#grid)" rx="10"/>
  <!-- fade edges -->
  <rect width="200" height="200" fill="url(#fadeLeft)" rx="10"/>
  <rect x="660" width="200" height="200" fill="url(#fadeRight)" rx="10"/>

  <!-- Left accent bar -->
  <rect x="32" y="44" width="3" height="112" rx="1.5" fill="url(#accentGrad)" class="slide1"/>

  <!-- Decorative dots top-right -->
  <circle cx="800" cy="36" r="2.5" fill="#39d353" class="dot-pulse"/>
  <circle cx="816" cy="36" r="2.5" fill="#26a641" class="dot-pulse" style="animation-delay:0.4s"/>
  <circle cx="832" cy="36" r="2.5" fill="#0e4429" class="dot-pulse" style="animation-delay:0.8s"/>

  <!-- Terminal prompt line -->
  <text x="48" y="76" class="prompt fade1">~/jhol-moreira</text>
  <text x="48" y="76" class="prompt fade1">
    <tspan fill="#8b949e"> ❯ </tspan>
    <tspan fill="#58a6ff">cat</tspan>
    <tspan fill="#e6edf3"> profile.json</tspan>
  </text>

  <!-- Name -->
  <text x="48" y="124" class="fade2" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="36px" fill="url(#nameGrad)" letter-spacing="-1">Jhol Moreira</text>

  <!-- Cursor blink after name -->
  <rect x="430" y="100" width="3" height="28" rx="1" class="blink fade2"/>

  <!-- Role tags row -->
  <g class="fade3">
    <!-- Tag 1 -->
    <rect x="48" y="136" width="122" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="59" y="151" class="tag" fill="#39d353">⚡</text>
    <text x="73" y="151" class="tag" fill="#8b949e">OutSystems</text>

    <!-- Tag 2 -->
    <rect x="178" y="136" width="90" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="189" y="151" class="tag" fill="#f7df1e">●</text>
    <text x="203" y="151" class="tag" fill="#8b949e">JavaScript</text>

    <!-- Tag 3 -->
    <rect x="276" y="136" width="70" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="287" y="151" class="tag" fill="#3776ab">●</text>
    <text x="301" y="151" class="tag" fill="#8b949e">Python</text>

    <!-- Tag 4 -->
    <rect x="354" y="136" width="62" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="365" y="151" class="tag" fill="#f05138">●</text>
    <text x="379" y="151" class="tag" fill="#8b949e">Swift</text>
  </g>

  <!-- Bottom line -->
  <g class="fade4">
    <text x="48" y="178" font-family="'JetBrains Mono',monospace" font-size="11px" fill="#3d444d">
      PM · Founder @UrbanCodeLabs · Mestrando FUNIBER · Goiânia 🇧🇷
    </text>
  </g>

  <!-- Right side decorative code block -->
  <g class="fade5">
    <rect x="580" y="58" width="240" height="98" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <rect x="580" y="58" width="240" height="20" rx="6" fill="#1c2128"/>
    <rect x="580" y="70" width="240" height="6" rx="0" fill="#1c2128"/>
    <circle cx="596" cy="68" r="4" fill="#ff5f57"/>
    <circle cx="610" cy="68" r="4" fill="#febc2e"/>
    <circle cx="624" cy="68" r="4" fill="#28c840"/>

    <text x="596" y="95" font-family="'JetBrains Mono',monospace" font-size="10px">
      <tspan fill="#8b949e">const </tspan>
      <tspan fill="#79c0ff">dev</tspan>
      <tspan fill="#8b949e"> = {</tspan>
    </text>
    <text x="604" y="110" font-family="'JetBrains Mono',monospace" font-size="10px">
      <tspan fill="#7ee787">years</tspan>
      <tspan fill="#8b949e">: </tspan>
      <tspan fill="#79c0ff">15</tspan>
      <tspan fill="#8b949e">,</tspan>
    </text>
    <text x="604" y="124" font-family="'JetBrains Mono',monospace" font-size="10px">
      <tspan fill="#7ee787">ships</tspan>
      <tspan fill="#8b949e">: </tspan>
      <tspan fill="#a5d6ff">"always"</tspan>
      <tspan fill="#8b949e">,</tspan>
    </text>
    <text x="604" y="138" font-family="'JetBrains Mono',monospace" font-size="10px">
      <tspan fill="#7ee787">coffee</tspan>
      <tspan fill="#8b949e">: </tspan>
      <tspan fill="#79c0ff">Infinity</tspan>
    </text>
    <text x="596" y="152" font-family="'JetBrains Mono',monospace" font-size="10px" fill="#8b949e">}</text>
  </g>
</svg>
