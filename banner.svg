<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="100%" style="background:#0d1117; border-radius:6px; display:block;">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideLeft { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      .blink { animation: blink 1.1s step-end infinite; }
      .f1 { animation: fadeIn 0.5s ease 0.1s both; }
      .f2 { animation: fadeIn 0.5s ease 0.35s both; }
      .f3 { animation: fadeIn 0.5s ease 0.6s both; }
      .f4 { animation: fadeIn 0.5s ease 0.85s both; }
      .f5 { animation: fadeIn 0.5s ease 1.1s both; }
      .sl { animation: slideLeft 0.6s ease 0.2s both; }
      .dp { animation: pulse 2.2s ease-in-out infinite; }
      .mono { font-family: "JetBrains Mono",ui-monospace,monospace; }
    </style>
    <pattern id="g" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0L0 0 0 28" fill="none" stroke="#1c2128" stroke-width="0.4"/>
    </pattern>
    <linearGradient id="fl" x1="1" x2="0" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="70%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fr" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="70%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="ag" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#26a641"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#adbac7"/>
    </linearGradient>
  </defs>

  <!-- bg + grid -->
  <rect width="860" height="200" fill="#0d1117" rx="6"/>
  <rect width="860" height="200" fill="url(#g)" rx="6"/>
  <rect width="180" height="200" fill="url(#fl)" rx="6"/>
  <rect x="680" width="180" height="200" fill="url(#fr)" rx="6"/>

  <!-- accent left bar -->
  <rect x="32" y="38" width="3" height="124" rx="1.5" fill="url(#ag)" class="sl"/>

  <!-- status dots top right -->
  <circle cx="806" cy="32" r="2.5" fill="#39d353" class="dp"/>
  <circle cx="820" cy="32" r="2.5" fill="#26a641" class="dp" style="animation-delay:0.5s"/>
  <circle cx="834" cy="32" r="2.5" fill="#0e4429" class="dp" style="animation-delay:1s"/>

  <!-- prompt line (above name, well separated) -->
  <text y="60" class="mono f1" font-size="12" x="48">
    <tspan fill="#3d444d">~/jhol-moreira</tspan>
    <tspan fill="#6e7681"> ❯ </tspan>
    <tspan fill="#58a6ff">cat</tspan>
    <tspan fill="#8b949e"> profile.json</tspan>
  </text>

  <!-- name — starts at y=105, well below prompt at y=60 -->
  <text x="48" y="108" class="mono f2" font-size="38" font-weight="700" fill="url(#ng)" letter-spacing="-1">Jhol Moreira</text>
  <!-- cursor -->
  <rect x="432" y="82" width="3" height="30" rx="1" fill="#39d353" class="blink f2"/>

  <!-- tech tags -->
  <g class="f3">
    <rect x="48"  y="120" width="110" height="21" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="58"  y="134" class="mono" font-size="10" fill="#39d353">⚡</text>
    <text x="72"  y="134" class="mono" font-size="10" fill="#8b949e">OutSystems</text>

    <rect x="166" y="120" width="94"  height="21" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="176" y="134" class="mono" font-size="10" fill="#f7df1e">●</text>
    <text x="190" y="134" class="mono" font-size="10" fill="#8b949e">JavaScript</text>

    <rect x="268" y="120" width="74"  height="21" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="278" y="134" class="mono" font-size="10" fill="#3776ab">●</text>
    <text x="292" y="134" class="mono" font-size="10" fill="#8b949e">Python</text>

    <rect x="350" y="120" width="58"  height="21" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <text x="360" y="134" class="mono" font-size="10" fill="#f05138">●</text>
    <text x="374" y="134" class="mono" font-size="10" fill="#8b949e">Swift</text>
  </g>

  <!-- bottom subtitle line -->
  <text x="48" y="164" class="mono f4" font-size="11" fill="#3d444d">PM · Developer · Founder @UrbanCodeLabs · Mestrando FUNIBER · Goiânia 🇧🇷</text>

  <!-- right code block -->
  <g class="f5">
    <rect x="574" y="50" width="248" height="106" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
    <!-- titlebar -->
    <rect x="574" y="50" width="248" height="22" rx="6" fill="#1c2128"/>
    <rect x="574" y="62" width="248" height="10" rx="0" fill="#1c2128"/>
    <circle cx="591" cy="61" r="4" fill="#ff5f57"/>
    <circle cx="606" cy="61" r="4" fill="#febc2e"/>
    <circle cx="621" cy="61" r="4" fill="#28c840"/>

    <text x="590" y="90" class="mono" font-size="10.5">
      <tspan fill="#8b949e">const </tspan><tspan fill="#79c0ff">dev</tspan><tspan fill="#8b949e"> = {</tspan>
    </text>
    <text x="600" y="106" class="mono" font-size="10.5">
      <tspan fill="#7ee787">years</tspan><tspan fill="#8b949e"> : </tspan><tspan fill="#79c0ff">16</tspan><tspan fill="#8b949e">,</tspan>
    </text>
    <text x="600" y="121" class="mono" font-size="10.5">
      <tspan fill="#7ee787">ships</tspan><tspan fill="#8b949e"> : </tspan><tspan fill="#a5d6ff">"always"</tspan><tspan fill="#8b949e">,</tspan>
    </text>
    <text x="600" y="136" class="mono" font-size="10.5">
      <tspan fill="#7ee787">coffee</tspan><tspan fill="#8b949e"> : </tspan><tspan fill="#79c0ff">Infinity</tspan>
    </text>
    <text x="590" y="151" class="mono" font-size="10.5" fill="#8b949e">}</text>
  </g>
</svg>